paths:
  data_dir: data
  results_dir: results
  legacy_output_dir: outputs

model:
  beta0: 0.04
  beta_multiplier:
    I: 1.0
    II: 1.0
    III: 1.0
    IV: 1.0
  susceptibility:
    "0-18": 1.0
    "19-49": 1.0
    "50-64": 1.0
    "65+": 1.0
  reinfection_susceptibility_scale: 0.7
  latent_period_days: 2.0
  infectious_period_days: 5.0
  waning_rate_per_day: 0.0
  infection_update: probability
  enable_reinfection: true

initial_conditions:
  mode: same_prevalence
  seed_compartment: I
  same_prevalence: 0.0001
  same_prevalence_by_age:
    "0-18": 0.0001
    "19-49": 0.0001
    "50-64": 0.0001
    "65+": 0.0001
  legacy_equal_absolute: 100.0
  seed_by_region_age:
    Region_A:
      "0-18": 100.0
      "19-49": 100.0
      "50-64": 100.0
      "65+": 100.0
    Region_B:
      "0-18": 0.0
      "19-49": 0.0
      "50-64": 0.0
      "65+": 0.0

counterfactual:
  no_holiday: false
  no_cross_region: false
  no_reinfection: false

legacy:
  write_legacy_outputs: true
  scenario_order: [I, II, IV]

run:
  mode: fixed
  run_name: fixed_period_I_baseline
  fixed_regime: I
  days: 180
  create_plots: true
