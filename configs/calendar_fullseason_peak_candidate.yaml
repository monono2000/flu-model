paths:
  data_dir: data
  results_dir: results
  legacy_output_dir: outputs
  winter_calendar_file: winter_calendar_fullseason.csv

model:
  beta0: 0.05
  beta_multiplier:
    I: 0.8
    II: 0.8
    III: 0.6
    IV: 1.2
  susceptibility:
    "0-18": 1.0
    "19-49": 1.0
    "50-64": 1.0
    "65+": 1.0
  reinfection_susceptibility_scale: 0.7
  latent_period_days: 2.0
  infectious_period_days: 5.0
  waning_rate_per_day: 0.005
  infection_update: probability
  enable_reinfection: true

initial_conditions:
  mode: same_prevalence
  seed_compartment: I
  same_prevalence: 0.0003

counterfactual:
  no_holiday: false
  no_cross_region: false
  no_reinfection: false

legacy:
  write_legacy_outputs: true
  scenario_order: [I, II, IV]

run:
  mode: calendar
  run_name: fullseason_peak_candidate
  fixed_regime: I
  days: 180
  create_plots: true
