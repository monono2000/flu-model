paths:
  data_dir: data
  results_dir: results
  legacy_output_dir: outputs

model:
  beta0: 0.04
  beta_multiplier:
    I: 1.0
    II: 1.0
    III: 1.0
    IV: 1.0
  susceptibility:
    "0-18": 1.0
    "19-49": 1.0
    "50-64": 1.0
    "65+": 1.0
  susceptibility_from_csv:
    enabled: true
    source_csv: data/synthetic_target_influenza_2025_2026.csv
    encoding: utf-8
    start_date: "2025-12-01"
    end_date: "2026-02-23"
    metric: mean
    normalize_to: mean
  reinfection_susceptibility_scale: 0.7
  latent_period_days: 2.0
  infectious_period_days: 5.0
  waning_rate_per_day: 0.005
  infection_update: probability
  enable_reinfection: true

initial_conditions:
  mode: same_prevalence
  seed_compartment: I
  same_prevalence: 0.0001

counterfactual:
  no_holiday: false
  no_cross_region: false
  no_reinfection: false

legacy:
  write_legacy_outputs: true
  scenario_order: [I, II, IV]

run:
  mode: calendar
  run_name: winter_calendar_synthetic_target_age_weighted
  fixed_regime: I
  days: 180
  create_plots: true
