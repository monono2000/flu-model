paths:
  data_dir: data
  results_dir: results
  legacy_output_dir: outputs

model:
  beta0: 0.04
  beta_multiplier:
    I: 0.8
    II: 1.2
    III: 0.8
    IV: 1.0
  susceptibility:
    "0-18": 0.85
    "19-49": 1.25
    "50-64": 1.1
    "65+": 0.8
  reinfection_susceptibility_scale: 0.7
  latent_period_days: 2.0
  infectious_period_days: 5.0
  waning_rate_per_day: 0.005
  infection_update: probability
  enable_reinfection: true

initial_conditions:
  mode: same_prevalence
  seed_compartment: I
  same_prevalence: 0.0003

counterfactual:
  no_holiday: false
  no_cross_region: false
  no_reinfection: false

legacy:
  write_legacy_outputs: true
  scenario_order: [I, II, IV]

run:
  mode: calendar
  run_name: winter_calendar_synthetic_calibrated_refined
  fixed_regime: I
  days: 180
  create_plots: true
